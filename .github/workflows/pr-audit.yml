name: Audit Templates

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Run debug-discovery
        id: discovery
        run: |
          {
            echo 'output<<EOF'
            make debug-discovery
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run debug-templates
        id: templates
        run: |
          make benchexec
          {
            echo 'output<<EOF'
            make debug-templates
            echo 'EOF'
          } | tee -a "$GITHUB_OUTPUT"

      - name: Download tools
        id: download
        run: |
          if make download-tools -j4 2>&1; then
            echo "All tools downloaded successfully."
          else
            echo "ERROR: Some tools failed to download."
          fi
          {
            echo 'output<<EOF'
            tree tools -L2
            echo 'EOF'
          } | tee -a "$GITHUB_OUTPUT"

      - name: Build comment body
        env:
          DISCOVERY: ${{ steps.discovery.outputs.output }}
          TEMPLATES: ${{ steps.templates.outputs.output }}
          DOWNLOADS: ${{ steps.download.outputs.output }}
        run: |
          {
            echo "## Discovery"
            echo ""
            echo '```'
            echo "$DISCOVERY"
            echo '```'
            echo ""
            echo "$TEMPLATES"
            echo ""
            echo "## Tool Downloads"
            echo ""
            echo '```'
            echo "$DOWNLOADS"
            echo '```'
          } > comment.md

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
