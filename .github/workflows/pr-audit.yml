name: Audit Templates

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Run debug-discovery
        id: discovery
        run: |
          {
            echo 'output<<EOF'
            make debug-discovery
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run debug-templates
        id: templates
        run: |
          make benchexec
          {
            echo 'output<<EOF'
            make debug-templates
            echo 'EOF'
          } | tee -a "$GITHUB_OUTPUT"

      - name: Download tools
        id: download
        run: |
          tree tools -L 2
          if make download-tools -j4 2>&1; then
            echo "All tools downloaded successfully."
          else
            echo "ERROR: Some tools failed to download."
          fi
          {
            echo 'output<<EOF'
            tree tools -L 2
            echo 'EOF'
          } | tee -a "$GITHUB_OUTPUT"

      - name: Check verifier/validator versions
        id: versions
        run: |
          make audit-tool-versions
          {
            echo 'table<<EOF'
            cat version-table.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build comment body
        env:
          VERSION_TABLE: ${{ steps.versions.outputs.table }}
        run: |
          {
            echo "## Discovered Verifiers"
            echo ""
            echo "$VERSION_TABLE"
          } > comment.md

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
