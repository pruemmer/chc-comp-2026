name: Audit Templates

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Download tools
        run: |
          tree tools -L 2
          if make download-tools -j4 2>&1; then
            echo "All tools downloaded successfully."
          else
            echo "ERROR: Some tools failed to download."
          fi

      - name: Run debug-templates
        id: templates
        run: |
          make benchexec
          {
            echo 'output<<EOF'
            make debug-templates
            echo 'EOF'
          } | tee -a "$GITHUB_OUTPUT"

      - name: Build comment body
        env:
          TEMPLATES: ${{ steps.templates.outputs.output }}
        run: |
          {
            echo "## Discovery"
            echo ""
            echo "$TEMPLATES"
            echo ""
          } > comment.md

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
